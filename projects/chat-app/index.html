<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="chat-container">
    <div class="messages" id="messages"></div>

    <form id="chat-form">
      <input 
        type="text" 
        id="message-input" 
        placeholder="Type a message..." 
        autocomplete="off"
      />
      <button type="submit">Send</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>

name: First PR Labeler

on:
  pull_request:
    types: [closed]

jobs:
  label-first-pr:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Check if first PR and update contributors
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const author = context.payload.pull_request.user.login;

            // Get all merged PRs by this user
            const mergedPRs = [];
            let page = 1;
            let hasMore = true;

            while (hasMore) {
              const response = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: "closed",
                creator: author,
                per_page: 100,
                page: page
              });

              response.data.forEach(pr => {
                if (pr.merged_at) {
                  mergedPRs.push(pr);
                }
              });

              hasMore = response.data.length === 100;
              page++;
            }

            if (mergedPRs.length === 1) {
              core.info(`${author} just made their FIRST PR 🎉`);

              // Add label
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: ["first-pr"]
              });

              // Add comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `🎉 Congratulations @${author} on your first merged PR!
              
              Welcome to Dev-Wengi 🚀
              
              You've officially joined the **First PR Club**.
              Keep building.`
              });

              // Update CONTRIBUTORS.md
              try {
                let contributorsFile = fs.readFileSync('CONTRIBUTORS.md', 'utf8');
                
                // Check if contributor already exists in the file
                if (contributorsFile.includes(`@${author}`)) {
                  core.info(`${author} already listed in CONTRIBUTORS.md`);
                  return;
                }

                // Add to First PR Club section - insert after the "These legends..." line
                const firstPRSectionRegex = /(## 🟢 First PR Club\s+These legends shipped their first contribution:)\s*\n/;
                if (!firstPRSectionRegex.test(contributorsFile)) {
                  core.warning(`Could not find "First PR Club" section in CONTRIBUTORS.md with expected format`);
                  return;
                }

                const updated = contributorsFile.replace(
                  firstPRSectionRegex,
                  `$1\n- @${author}\n`
                );

                if (updated === contributorsFile) {
                  core.warning(`Regex replacement did not modify CONTRIBUTORS.md - check file format`);
                  return;
                }

                fs.writeFileSync('CONTRIBUTORS.md', updated);
                core.info(`✅ Added @${author} to CONTRIBUTORS.md First PR Club`);
              } catch (error) {
                core.error(`Could not update CONTRIBUTORS.md: ${error.message}`);
                throw error;
              }
            } else {
              core.info(`${author} has ${mergedPRs.length} merged PRs`);
            }

      - name: Get contributor email
        id: contributor_email
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.pull_request.user.login;
            try {
              const user = await github.rest.users.getByUsername({
                username: author
              });
              const email = user.data.email;
              if (email) {
                core.setOutput('email', email);
                core.info(`Contributor email: ${email}`);
              } else {
                core.warning(`No public email found for ${author}`);
                core.setOutput('email', '');
              }
            } catch (error) {
              core.error(`Error fetching user info: ${error.message}`);
              core.setOutput('email', '');
            }

      - name: Send Outlook email notification
        if: success() && github.event.pull_request.merged == true && steps.contributor_email.outputs.email != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.office365.com
          server_port: 587
          username: ${{ secrets.OUTLOOK_EMAIL }}
          password: ${{ secrets.OUTLOOK_PASSWORD }}
          subject: "🎉 Welcome to Dev-Wengi - First PR Merged!"
          to: ${{ steps.contributor_email.outputs.email }}
          from: ${{ secrets.OUTLOOK_EMAIL }}
          body: |
            Congratulations! 🎉

            Your first PR has been merged on Dev-Wengi!

            PR Title: ${{ github.event.pull_request.title }}
            PR #: ${{ github.event.pull_request.number }}

            You've officially joined the First PR Club! 🚀
            Keep building amazing things!

      - name: Commit and push changes
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add CONTRIBUTORS.md
          if git diff --cached --quiet; then
            echo "✓ No changes to commit"
          else
            git commit -m "docs: add @${{ github.event.pull_request.user.login }} to CONTRIBUTORS.md 🎉"
            if git push; then
              echo "✓ Changes pushed successfully"
            else
              echo "❌ Failed to push changes"
              exit 1
            fi
          fi
            • Full code of conduct: https://github.com/dev-wengi/dev-wengi/blob/main/CODE_OF_CONDUCT.md

            ---

            📝 HOW TO CONTRIBUTE NEXT TIME
            ==============================
            1. Pick an issue or project that interests you
            2. Comment to claim it (if it's open for contributors)
            3. Fork → Branch → Code → Test → PR
            4. Add meaningful PR description and link related issues
            5. Iterate on feedback from reviewers

            ---

            🎯 NEXT STEPS
            =============
            ✓ Star the repo: https://github.com/dev-wengi/dev-wengi
            ✓ Start a discussion: https://github.com/dev-wengi/dev-wengi/discussions
            ✓ Join our community channels
            ✓ Help review other PRs

            ---

            You're awesome for contributing! Keep building. 🔥

            Need help? Feel free to reach out or open an issue!

            Best regards,
            The Dev-Wengi Team
          html_body: |

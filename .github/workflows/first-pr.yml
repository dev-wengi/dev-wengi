name: First PR Labeler

on:
  pull_request:
    types: [closed]

jobs:
  label-first-pr:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if first PR and update contributors
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const author = context.payload.pull_request.user.login;

            // Get all merged PRs by this user
            const mergedPRs = [];
            let page = 1;
            let hasMore = true;

            while (hasMore) {
              const response = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: "closed",
                creator: author,
                per_page: 100,
                page: page
              });

              response.data.forEach(pr => {
                if (pr.merged_at) {
                  mergedPRs.push(pr);
                }
              });

              hasMore = response.data.length === 100;
              page++;
            }

            if (mergedPRs.length === 1) {
              core.info(`${author} just made their FIRST PR 🎉`);

              // Add label
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: ["first-pr"]
              });

              // Add comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `🎉 Congratulations @${author} on your first merged PR!
              
              Welcome to Dev-Wengi 🚀
              
              You've officially joined the **First PR Club**.
              Keep building.`
              });

              // Update CONTRIBUTORS.md
              try {
                let contributorsFile = fs.readFileSync('CONTRIBUTORS.md', 'utf8');
                
                // Check if contributor already exists in the file
                if (contributorsFile.includes(`@${author}`)) {
                  core.info(`${author} already listed in CONTRIBUTORS.md`);
                  return;
                }

                // Add to First PR Club section
                const firstPRSectionRegex = /(## 🟢 First PR Club\s+These legends shipped their first contribution:\s+)(- @[^\n]+)/;
                contributorsFile = contributorsFile.replace(
                  firstPRSectionRegex,
                  `$1- @${author}\n$2`
                );

                fs.writeFileSync('CONTRIBUTORS.md', contributorsFile);
                core.info(`Added @${author} to CONTRIBUTORS.md`);
              } catch (error) {
                core.warning(`Could not update CONTRIBUTORS.md: ${error.message}`);
              }
            } else {
              core.info(`${author} has ${mergedPRs.length} merged PRs`);
            }

      - name: Commit and push changes
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add CONTRIBUTORS.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: add @${{ github.event.pull_request.user.login }} to CONTRIBUTORS.md 🎉" && git push)

      - name: Get Contributor Email
        if: success()
        id: get-email
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.pull_request.user.login;
            try {
              const user = await github.rest.users.getByUsername({
                username: author
              });
              
              // Try to get public email first
              let email = user.data.email;
              
              // If no public email, try to get from commits
              if (!email) {
                const commits = await github.rest.repos.getCommit({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: context.payload.pull_request.head.sha
                });
                email = commits.data.commit.author.email;
              }
              
              if (email) {
                core.setOutput('email', email);
                core.info(`Found email: ${email}`);
              } else {
                core.warning(`Could not find email for ${author}`);
              }
            } catch (error) {
              core.warning(`Error getting user info: ${error.message}`);
            }

      - name: Send Welcome Email
        if: success() && steps.get-email.outputs.email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.EMAIL_SERVER }}
          server_port: ${{ secrets.EMAIL_PORT || '587' }}
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🎉 Welcome to Dev-Wengi, @${{ github.event.pull_request.user.login }}!"
          to: ${{ steps.get-email.outputs.email }}
          from: Dev-Wengi Team <${{ secrets.EMAIL_FROM || secrets.EMAIL_USERNAME }}>
          body: |
            👋 Welcome to Dev-Wengi, @${{ github.event.pull_request.user.login }}!

            You've just joined an amazing community of builders! 🚀

            Your PR "${{ github.event.pull_request.title }}" has been successfully merged, and you're now part of the First PR Club!

            ---

            📚 GETTING STARTED
            ==================
            • Explore challenges: https://github.com/dev-wengi/dev-wengi/tree/main/challenges
            • Browse projects: https://github.com/dev-wengi/dev-wengi/tree/main/projects

            Pick your track:
            - Frontend: https://github.com/dev-wengi/dev-wengi/tree/main/tracks/frontend
            - Backend: https://github.com/dev-wengi/dev-wengi/tree/main/tracks/backend
            - DevOps: https://github.com/dev-wengi/dev-wengi/tree/main/tracks/devops
            - Security: https://github.com/dev-wengi/dev-wengi/tree/main/tracks/security

            Read the guide: https://github.com/dev-wengi/dev-wengi/blob/main/CONTRIBUTING.md

            ---

            🤝 COMMUNITY STANDARDS
            =====================
            • Be respectful and inclusive
            • Help others grow and learn
            • Share knowledge and feedback generously
            • No gatekeeping — everyone's welcome here
            • Full code of conduct: https://github.com/dev-wengi/dev-wengi/blob/main/CODE_OF_CONDUCT.md

            ---

            📝 HOW TO CONTRIBUTE NEXT TIME
            ==============================
            1. Pick an issue or project that interests you
            2. Comment to claim it (if it's open for contributors)
            3. Fork → Branch → Code → Test → PR
            4. Add meaningful PR description and link related issues
            5. Iterate on feedback from reviewers

            ---

            🎯 NEXT STEPS
            =============
            ✓ Star the repo: https://github.com/dev-wengi/dev-wengi
            ✓ Start a discussion: https://github.com/dev-wengi/dev-wengi/discussions
            ✓ Join our community channels
            ✓ Help review other PRs

            ---

            You're awesome for contributing! Keep building. 🔥

            Need help? Feel free to reach out or open an issue!

            Best regards,
            The Dev-Wengi Team
          html_body: |
            <!DOCTYPE html>
            <html>
            <head>
              <style>
                body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; line-height: 1.6; color: #333; }
                .container { max-width: 600px; margin: 0 auto; padding: 20px; }
                .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; border-radius: 8px; text-align: center; }
                .header h1 { margin: 0; font-size: 24px; }
                .section { margin: 20px 0; }
                .section h2 { color: #667eea; font-size: 16px; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
                .section ul { margin: 10px 0; padding-left: 20px; }
                .section li { margin: 8px 0; }
                a { color: #667eea; text-decoration: none; }
                a:hover { text-decoration: underline; }
                .footer { margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; text-align: center; font-size: 12px; color: #666; }
                .badge { display: inline-block; background: #667eea; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; margin: 5px 0; }
              </style>
            </head>
            <body>
              <div class="container">
                <div class="header">
                  <h1>👋 Welcome to Dev-Wengi!</h1>
                  <p>@${{ github.event.pull_request.user.login }}, you're officially part of the community! 🚀</p>
                </div>

                <div class="section">
                  <p>Your PR <strong>"${{ github.event.pull_request.title }}"</strong> has been successfully merged! 🎉</p>
                  <p><span class="badge">First PR Club</span> You've been added to our CONTRIBUTORS.md!</p>
                </div>

                <div class="section">
                  <h2>📚 Getting Started</h2>
                  <ul>
                    <li><a href="https://github.com/dev-wengi/dev-wengi/tree/main/challenges">Explore challenges</a></li>
                    <li><a href="https://github.com/dev-wengi/dev-wengi/tree/main/projects">Browse projects</a></li>
                    <li><a href="https://github.com/dev-wengi/dev-wengi/blob/main/CONTRIBUTING.md">Read CONTRIBUTING.md</a></li>
                  </ul>
                  <p><strong>Pick your track:</strong></p>
                  <ul>
                    <li><a href="https://github.com/dev-wengi/dev-wengi/tree/main/tracks/frontend">Frontend</a></li>
                    <li><a href="https://github.com/dev-wengi/dev-wengi/tree/main/tracks/backend">Backend</a></li>
                    <li><a href="https://github.com/dev-wengi/dev-wengi/tree/main/tracks/devops">DevOps</a></li>
                    <li><a href="https://github.com/dev-wengi/dev-wengi/tree/main/tracks/security">Security</a></li>
                  </ul>
                </div>

                <div class="section">
                  <h2>🤝 Community Standards</h2>
                  <ul>
                    <li>Be respectful and inclusive</li>
                    <li>Help others grow and learn</li>
                    <li>Share knowledge and feedback generously</li>
                    <li>No gatekeeping — everyone's welcome</li>
                  </ul>
                  <p><a href="https://github.com/dev-wengi/dev-wengi/blob/main/CODE_OF_CONDUCT.md">View full Code of Conduct →</a></p>
                </div>

                <div class="section">
                  <h2>📝 How to Contribute Next Time</h2>
                  <ol>
                    <li>Pick an issue or project that interests you</li>
                    <li>Comment to claim it (if it's open for contributors)</li>
                    <li>Fork → Branch → Code → Test → PR</li>
                    <li>Add meaningful PR description and link related issues</li>
                    <li>Iterate on feedback from reviewers</li>
                  </ol>
                </div>

                <div class="section">
                  <h2>🎯 Next Steps</h2>
                  <ul>
                    <li><a href="https://github.com/dev-wengi/dev-wengi">⭐ Star the repo</a></li>
                    <li><a href="https://github.com/dev-wengi/dev-wengi/discussions">💬 Start a discussion</a></li>
                    <li>🤝 Join our community channels</li>
                    <li>👀 Help review other PRs</li>
                  </ul>
                </div>

                <div class="section">
                  <p><strong>You're awesome for contributing! Keep building. 🔥</strong></p>
                  <p>Need help? Feel free to reach out or open an issue!</p>
                </div>

                <div class="footer">
                  <p>The Dev-Wengi Team | <a href="https://github.com/dev-wengi/dev-wengi">GitHub</a></p>
                </div>
              </div>
            </body>
            </html>

      - name: Email Not Available
        if: success() && !steps.get-email.outputs.email
        run: echo "⚠️  Could not retrieve email for contributor. Welcome message will still be posted as PR comment."

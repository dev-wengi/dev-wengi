                  <ul>
                    <li><a href="https://github.com/dev-wengi/dev-wengi/tree/main/challenges">Explore challenges</a></li>
                    <li><a href="https://github.com/dev-wengi/dev-wengi/tree/main/projects">Browse projects</a></li>
                    <li><a href="https://github.com/dev-wengi/dev-wengi/blob/main/CONTRIBUTING.md">Read CONTRIBUTING.md</a></li>
                  </ul>
                  <p><strong>Pick your track:</strong></p>
                  <ul>
                    <li><a href="https://github.com/dev-wengi/dev-wengi/tree/main/tracks/frontend">Frontend</a></li>
                    <li><a href="https://github.com/dev-wengi/dev-wengi/tree/main/tracks/backend">Backend</a></li>
                    <li><a href="https://github.com/dev-wengi/dev-wengi/tree/main/tracks/devops">DevOps</a></li>
                    <li><a href="https://github.com/dev-wengi/dev-wengi/tree/main/tracks/security">Security</a></li>
                  </ul>
                </div>

                <div class="section">
                  <h2>🤝 Community Standards</h2>
                  <ul>
                    <li>Be respectful and inclusive</li>
                    <li>Help others grow and learn</li>
                    <li>Share knowledge and feedback generously</li>
                    <li>No gatekeeping — everyone's welcome</li>
                  </ul>
                  <p><a href="https://github.com/dev-wengi/dev-wengi/blob/main/CODE_OF_CONDUCT.md">View full Code of Conduct →</a></p>
                </div>

                <div class="section">
                  <h2>📝 How to Contribute Next Time</h2>
                  <ol>
                    <li>Pick an issue or project that interests you</li>
                    <li>Comment to claim it (if it's open for contributors)</li>
                    <li>Fork → Branch → Code → Test → PR</li>
                    <li>Add meaningful PR description and link related issues</li>
                    <li>Iterate on feedback from reviewers</li>
                  </ol>
                </div>

                <div class="section">
                  <h2>🎯 Next Steps</h2>
                  <ul>
                    <li><a href="https://github.com/dev-wengi/dev-wengi">⭐ Star the repo</a></li>
                    <li><a href="https://github.com/dev-wengi/dev-wengi/discussions">💬 Start a discussion</a></li>
                    <li>🤝 Join our community channels</li>
                    <li>👀 Help review other PRs</li>
                  </ul>
                </div>

                <div class="section">
                  <p><strong>You're awesome for contributing! Keep building. 🔥</strong></p>
                  <p>Need help? Feel free to reach out or open an issue!</p>
                </div>

                <div class="footer">
                  <p>The Dev-Wengi Team | <a href="https://github.com/dev-wengi/dev-wengi">GitHub</a></p>
                </div>
              </div>
            </body>
            </html>

      - name: Summary
        if: success()
        run: |
          echo "✅ Workflow completed"
          echo "  • First PR detection: Complete"
          echo "  • Label added: first-pr"
          echo "  • Comment posted: Yes"
          echo "  • CONTRIBUTORS.md updated: Check step output"
          echo "  • Email: ${{ steps.get-email.outputs.email || 'Not available' }}"

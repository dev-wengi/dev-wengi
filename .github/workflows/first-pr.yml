                .header h1 { margin: 0; font-size: 24px; }
                .section { margin: 20px 0; }
                .section h2 { color: #667eea; font-size: 16px; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
                .section ul { margin: 10px 0; padding-left: 20px; }
                .section li { margin: 8px 0; }
                a { color: #667eea; text-decoration: none; }
                a:hover { text-decoration: underline; }
                .footer { margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; text-align: center; font-size: 12px; color: #666; }
                .badge { display: inline-block; background: #667eea; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; margin: 5px 0; }
              </style>
            </head>
            <body>
              <div class="container">
                <div class="header">
                  <h1>👋 Welcome to Dev-Wengi!</h1>
                  <p>@${{ github.event.pull_request.user.login }}, you're officially part of the community! 🚀</p>
                </div>

                <div class="section">
                  <p>Your PR <strong>"${{ github.event.pull_request.title }}"</strong> has been successfully merged! 🎉</p>
